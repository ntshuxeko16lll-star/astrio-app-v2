<section class="page-screen auth-shell">
  <div class="card auth-card column">
    <div class="row" style="gap:14px; align-items:center;">
      <div class="brand-orb"></div>
      <div class="column" style="gap:4px;">
        <h1 class="page-title">Astrio</h1>
        <p class="page-subtitle">Social · Creators · AI</p>
      </div>
    </div>

    <div id="auth-message" class="status-line"></div>

    <div id="login-panel" class="column">
      <div class="page-head">
        <h2 class="page-title" style="font-size:1.05rem;">Login</h2>
        <p class="page-subtitle">Open your account</p>
      </div>

      <form id="login-form" class="form-grid">
        <input id="login-email" class="input" type="email" placeholder="Email" autocomplete="email" required />
        <input id="login-password" class="input" type="password" placeholder="Password" autocomplete="current-password" required />
        <button class="btn btn-primary" type="submit">Continue</button>
      </form>

      <button id="go-signup" class="btn btn-ghost" type="button">Create account</button>
    </div>

    <div id="signup-panel" class="column hidden">
      <div class="page-head">
        <h2 class="page-title" style="font-size:1.05rem;">Create account</h2>
        <p class="page-subtitle">Start posting and creating</p>
      </div>

      <form id="signup-form" class="form-grid">
        <input id="signup-username" class="input" type="text" placeholder="Username" autocomplete="username" required />
        <input id="signup-email" class="input" type="email" placeholder="Email" autocomplete="email" required />
        <input id="signup-password" class="input" type="password" placeholder="Password" autocomplete="new-password" required />
        <button class="btn btn-primary" type="submit">Create</button>
      </form>

      <button id="go-login" class="btn btn-ghost" type="button">Back to login</button>
    </div>
  </div>
          </section>
