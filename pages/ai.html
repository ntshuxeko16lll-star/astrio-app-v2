<section class="page-screen">
  <div class="page-head">
    <h1 class="page-title">AI Studio</h1>
    <p class="page-subtitle">Captions, hashtags, and ideas</p>
  </div>

  <div class="card column">
    <textarea id="ai-prompt" class="textarea" placeholder="Write a prompt for Astrio AI..."></textarea>

    <div class="row" style="flex-wrap:wrap;">
      <button id="ai-caption-btn" class="btn btn-primary" type="button">Generate captions</button>
      <button id="ai-hashtag-btn" class="btn" type="button">Generate hashtags</button>
      <button id="ai-idea-btn" class="btn btn-ghost" type="button">Generate ideas</button>
    </div>
  </div>

  <div id="ai-output" class="column"></div>
</section>
