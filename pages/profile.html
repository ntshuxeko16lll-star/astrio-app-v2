<section class="page-screen">
  <div class="page-head">
    <h1 class="page-title">Profile</h1>
    <p class="page-subtitle">Your account and creator stats</p>
  </div>

  <div class="card profile-wrap">
    <div class="profile-top">
      <img id="profile-avatar" class="avatar avatar-xl" src="assets/logo.png" alt="Profile avatar" />
      <div class="column" style="gap:4px;">
        <strong id="profile-username">Astrio</strong>
        <span id="profile-email" class="small-note"></span>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <strong id="profile-posts">0</strong>
        <span class="small-note">Posts</span>
      </div>
      <div class="stat">
        <strong id="profile-followers">0</strong>
        <span class="small-note">Followers</span>
      </div>
      <div class="stat">
        <strong id="profile-following">0</strong>
        <span class="small-note">Following</span>
      </div>
    </div>

    <div class="form-grid">
      <input id="profile-username-input" class="input" type="text" placeholder="Username" />
      <input id="profile-avatar-input" class="input" type="url" placeholder="Avatar URL" />
      <textarea id="profile-bio" class="textarea" placeholder="Bio"></textarea>
      <button id="profile-save-btn" class="btn btn-primary" type="button">Save</button>
      <div id="profile-status" class="status-line"></div>
    </div>
  </div>
  </section>
