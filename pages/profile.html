
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astrio – Profile</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="../js/profile.js" defer></script>
</head>
<body class="bg-dark text-white font-sans">
  <header class="top-nav glass">
    <h1>Profile</h1>
  </header>

  <main class="profile-container">
    <div class="profile-header">
      <img id="profile-avatar" src="../assets/logo.png" alt="User Avatar">
      <h2 id="profile-name">User Name</h2>
      <p id="profile-stats">Posts: 0 | Followers: 0 | Following: 0</p>
    </div>

    <div class="profile-posts" id="profile-posts">
      <!-- User posts will load dynamically -->
    </div>
  </main>
</body>
</html>
