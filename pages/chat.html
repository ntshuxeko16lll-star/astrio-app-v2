<section class="page-screen">
  <div class="page-head">
    <h1 class="page-title">Chat</h1>
    <p class="page-subtitle">Rooms, messages, and realtime updates</p>
  </div>

  <div class="chat-shell">
    <div class="card column">
      <div class="row">
        <input id="chat-room-name" class="input" type="text" placeholder="New room name" />
        <button id="chat-new-room" class="btn btn-ghost" type="button">Create</button>
      </div>
      <div id="chat-room-list" class="room-list"></div>
    </div>

    <div id="chat-messages" class="message-list"></div>

    <div class="card column">
      <input id="chat-input" class="input" type="text" placeholder="Type a message..." />
      <button id="chat-send-btn" class="btn btn-primary" type="button">Send</button>
    </div>
  </div>
        </section>
