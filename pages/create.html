<section class="page-screen">
  <div class="page-head">
    <h1 class="page-title">Create</h1>
    <p class="page-subtitle">Upload a reel, image, audio, or text post</p>
  </div>

  <div class="card column">
    <input id="media-file" class="input" type="file" accept="image/*,video/*,audio/*" />
    <textarea id="create-caption" class="textarea" placeholder="Write a caption..."></textarea>

    <select id="post-type" class="select">
      <option value="text">Text</option>
      <option value="image">Image</option>
      <option value="video">Video</option>
      <option value="music">Music</option>
    </select>

    <div class="row" style="flex-wrap:wrap;">
      <button id="filter-neon" class="btn btn-ghost" type="button">Neon filter</button>
      <button id="filter-monochrome" class="btn btn-ghost" type="button">Mono filter</button>
      <button id="filter-clear" class="btn btn-ghost" type="button">Clear</button>
    </div>

    <div id="media-preview" class="card-soft"></div>

    <button id="create-post-btn" class="btn btn-primary" type="button">Post</button>
    <div id="create-status" class="status-line"></div>
  </div>
  </section>
