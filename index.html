<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrio v2</title>
  <meta name="theme-color" content="#050816" />
  <meta name="description" content="Astrio v2 — social, reels, AI, chat, and creators." />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/logo.png" type="image/png" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="js/app.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/feed.js" defer></script>
  <script src="js/ai.js" defer></script>
  <script src="js/notifications.js" defer></script>
  <script src="js/chat.js" defer></script>
  <script src="js/profile.js" defer></script>
  <script src="js/mediaTools.js" defer></script>
</head>
<body>
  <header class="shell-top">
    <button class="shell-btn" data-page="feed" aria-label="Feed">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 6h18v2H3V6zm0 5h12v2H3v-2zm0 5h18v2H3v-2z"></path>
      </svg>
    </button>

    <button class="shell-btn" data-page="ai" aria-label="AI">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2l1.8 5.6L19 9.4l-5.2 1.8L12 16l-1.8-4.8L5 9.4l5.2-1.8L12 2zm7.5 10l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3zM5 13l.9 2.6L8.5 16.5 5.9 17.4 5 20l-.9-2.6L1.5 16.5 4.1 15.6 5 13z"></path>
      </svg>
    </button>

    <button class="shell-btn" data-page="notifications" aria-label="Notifications">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22zm7-6V11a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2z"></path>
      </svg>
    </button>
  </header>

  <main id="app" class="app-stage"></main>

  <nav class="shell-bottom">
    <button class="shell-btn" data-page="feed" aria-label="Home">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3 3 10v11h7v-7h4v7h7V10l-9-7z"></path>
      </svg>
    </button>

    <button class="shell-btn" data-page="market" aria-label="Market">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 7h15l-1.5 7.5H8L6 7zm0 0L5 4H2v2h2l2.3 11.5A2 2 0 0 0 8.3 19H19v-2H8.3l-.3-1.5H18a2 2 0 0 0 2-1.6L22 5H6zM9 22a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm8 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"></path>
      </svg>
    </button>

    <button class="shell-btn shell-center" data-page="create" aria-label="Create">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M11 5h2v14h-2zM5 11h14v2H5z"></path>
      </svg>
    </button>

    <button class="shell-btn" data-page="chat" aria-label="Chat">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 4h16v12H7l-3 3V4zm4 4h8v2H8V8zm0 4h6v2H8v-2z"></path>
      </svg>
    </button>

    <button class="shell-btn" data-page="profile" aria-label="Profile">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"></path>
      </svg>
    </button>
  </nav>
</body>
    </html>
