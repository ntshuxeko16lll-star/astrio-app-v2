<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrio v2</title>
    
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">

    <!-- Tailwind CSS CDN for rapid neon styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Framer Motion / Anime.js for animations -->
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Web App Meta -->
    <meta name="theme-color" content="#0f0f0f">
    <meta name="description" content="Astrio v2 – Futuristic AI + Social Media App">
</head>
<body class="bg-black text-white font-sans">

    <!-- Top Navigation -->
    <header class="w-full p-4 flex justify-between items-center backdrop-blur-md bg-black/50 fixed top-0 z-50">
        <div class="text-2xl font-bold neon-text">Discover</div>
        <div class="flex space-x-4">
            <button id="ai-btn" class="neon-btn w-10 h-10">
                <img src="assets/icons/ai.svg" alt="AI">
            </button>
            <button id="notif-btn" class="neon-btn w-10 h-10">
                <img src="assets/icons/notification.svg" alt="Notifications">
            </button>
        </div>
    </header>

    <!-- Main Feed / Content -->
    <main class="pt-24 pb-24">
        <section id="feed" class="flex flex-col space-y-4 px-4">
            <!-- Feed posts will be injected here by feed.js -->
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full flex justify-around items-center py-3 backdrop-blur-md bg-black/50">
        <button class="nav-btn">
            <img src="assets/icons/home.svg" alt="Home" class="w-6 h-6">
        </button>
        <button class="nav-btn">
            <img src="assets/icons/market.svg" alt="Marketplace" class="w-6 h-6">
        </button>
        <button class="nav-btn create-btn">
            <img src="assets/icons/create.svg" alt="Create" class="w-10 h-10">
        </button>
        <button class="nav-btn">
            <img src="assets/icons/chat.svg" alt="Chat" class="w-6 h-6">
        </button>
        <button class="nav-btn">
            <img src="assets/icons/profile.svg" alt="Profile" class="w-6 h-6">
        </button>
    </nav>

    <!-- JS -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/feed.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/mediaTools.js"></script>

</body>
  </html>
