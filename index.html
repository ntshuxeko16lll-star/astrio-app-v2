<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Astrio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Icons -->
  <script src="https://twemoji.maxcdn.com/v/latest/twemoji.min.js"></script>

  <style>
    body {
      background: #050505;
      color: white;
      font-family: sans-serif;
    }
    .neon {
      box-shadow: 0 0 10px #00f3ff, 0 0 20px #ff00ff;
    }
  </style>
</head>

<body class="flex flex-col h-screen">

<!-- 🔝 TOP NAV -->
<div class="flex justify-between p-3 border-b border-gray-800 bg-black/50 backdrop-blur">
  <button onclick="loadPage('feed')" class="text-cyan-400">Discover</button>
  <button onclick="loadPage('ai')" class="text-purple-400">AI</button>
  <button onclick="loadPage('notifications')" class="text-pink-400">🔔</button>
</div>

<!-- 📱 MAIN CONTENT -->
<div id="app" class="flex-1 overflow-y-auto">
  <!-- Pages will load here -->
</div>

<!-- 🔻 BOTTOM NAV -->
<div class="flex justify-around p-3 border-t border-gray-800 bg-black/50 backdrop-blur">
  <button onclick="loadPage('feed')">🏠</button>
  <button onclick="loadPage('market')">🛒</button>
  <button onclick="loadPage('create')" class="bg-gradient-to-r from-cyan-400 to-pink-500 px-3 py-1 rounded-full">➕</button>
  <button onclick="loadPage('chat')">💬</button>
  <button onclick="loadPage('profile')">👤</button>
</div>

<!-- 🚀 SCRIPT -->
<script>
/* =============================
   🔗 SUPABASE CONNECTION
============================= */
const SUPABASE_URL = "https://llooewepqlkcpqzmiuzo.supabase.co";
const SUPABASE_KEY = "sb_publishable_vYhWHzf0GkDxch6hp9QmAA_kXkJEu6C";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =============================
   📄 PAGE LOADER
============================= */
async function loadPage(page) {
  const res = await fetch(`pages/${page}.html`);
  const html = await res.text();
  document.getElementById("app").innerHTML = html;
}

/* =============================
   🔐 CHECK AUTH
============================= */
async function checkUser() {
  const { data } = await supabaseClient.auth.getUser();
  if (!data.user) {
    loadPage('auth');
  } else {
    loadPage('feed');
  }
}

/* =============================
   🚀 INIT APP
============================= */
checkUser();
</script>

</body>
  </html>
